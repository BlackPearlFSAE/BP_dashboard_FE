# ─────────────────────────────────────────────────────────────────────────────
# HTTP config setup. 
# HTTPS block kept commented below for when TLS is properly wired up (Later commit).
# When enabling HTTPS: replace `yourdomain.com` in 4 places and see root README
# for the certbot flow.
# ─────────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;   # If Upgrade header exists, set Connection: upgrade
    ''      close;     # If no Upgrade header, set Connection: close
}

server {
    listen 80;
    server_name _;

    # --- Serve Static Frontend ---
    location / {
       root /usr/share/nginx/bpdash/dist; # pointed to build file
       index index.html;
       try_files $uri $uri/ /index.html;
       # When reload, try 3 file location if not found file:
               #   1. Try the exact file ($uri)      — e.g. /assets/logo.png
               #   2. Try it as a directory ($uri/)
               #   3. Fall back to /index.html
               # Without this, hitting /dashboard directly (or refreshing) = 404
    }

    # --- Reverse Proxy to Backend websocket ---
    location /ws {
        proxy_pass http://backend:3000;

        # WebSocket upgrade headers ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;       # Forward client's Upgrade header
        proxy_set_header Connection $connection_upgrade; # From the map block above
        proxy_buffering off;

        # Standard reverse proxy headers ---
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Timeouts for long-lived WebSocket connections ---
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # --- In case dev want to use Backend api endpoint ---
    location /api/ {
       proxy_pass http://backend:3000;
       proxy_http_version 1.1;
       proxy_set_header Host              $host;
       proxy_set_header X-Real-IP         $remote_addr;
       proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
       proxy_set_header X-Forwarded-Host  $host;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — enable later. Requires certs at /etc/letsencrypt/live/<domain>/
# and the bind mount in compose.yml. When enabling, remove the HTTP server
# block above (or change it to a 301 redirect).
